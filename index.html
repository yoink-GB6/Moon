<script type="module">
const _V = Date.now(); // 缓存破坏版本号，每次加载页面时生成
import { showToast, initSidebar, closeSidebar, confirmDialog, bindPanelToggle } from './core/ui.js';
import { isEditor, tryUnlock, lock, onAuthChange } from './core/auth.js';

// ── Router config ──────────────────────────────────
// 添加新页面：在这里加一条记录，并在 pages/ 目录下建对应 .js 文件
const ROUTES = [
  {
    id: 'home',
    label: '⌂ 主页',
    icon: '⌂',
    loader: () => import('./pages/home.js?v='+_V),
  },
  {
    id: 'geo',
    label: '🏳 国家',
    icon: '🏳',
    loader: () => import('./pages/geo.js?v='+_V),
  },
  {
    id: 'characters',
    label: '☲ 人物',
    icon: '☲',
    loader: () => import('./pages/characters.js?v='+_V),
  },
  {
    id: 'timeline',
    label: '⏱ 年龄轴',
    icon: '⏱',
    loader: () => import('./pages/timeline.js?v='+_V),
  },
  {
    id: 'library',
    label: '¶ 指令集',
    icon: '¶',
    loader: () => import('./pages/library.js?v='+_V),
  },
  {
    id: 'gacha',
    label: '✦ 抽卡',
    icon: '✦',
    loader: () => import('./pages/gacha.js?v='+_V),
  },
];

// ── State ──────────────────────────────────────────
let currentRoute = null;
let currentModule = null;
let _navSeq = 0;

// ── Build nav ──────────────────────────────────────
function buildNav() {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = ROUTES.map(r => `
    <div class="nav-item${r.id===currentRoute?.id?' active':''}" data-id="${r.id}">
      <span class="nav-icon">${r.icon}</span>
      <span class="nav-label">${r.label.replace(r.icon,'').trim()}</span>
      ${r.placeholder ? '<span style="font-size:10px;color:#555;margin-left:auto">soon</span>' : ''}
    </div>
  `).join('');
  nav.querySelectorAll('.nav-item').forEach(el => {
    el.addEventListener('click', () => {
      navigate(el.dataset.id);
      closeSidebar();
    });
  });
}

// ── Navigate ────────────────────────────────────────
async function tryLoad(loader, maxAttempts = 3) {
  for (let i = 0; i < maxAttempts; i++) {
    try { return await loader(); }
    catch(e) {
      if (i === maxAttempts - 1) throw e;
      await new Promise(r => setTimeout(r, 600 * (i + 1)));
    }
  }
}

async function navigate(id) {
  const route = ROUTES.find(r => r.id === id) || ROUTES[0];
  if (currentRoute?.id === route.id) return;

  if (currentModule?.unmount) currentModule.unmount();

  currentRoute = route;
  currentModule = null;
  buildNav();

  document.getElementById('topbar-title').textContent = route.label;

  const root = document.getElementById('page-root');
  root.innerHTML = '';

  if (route.placeholder) {
    root.innerHTML = `
      <div class="page-placeholder">
        <div class="placeholder-icon">${route.icon}</div>
        <h2>${route.label.replace(route.icon,'').trim()}</h2>
        <p>这个页面正在建设中，敬请期待。</p>
      </div>`;
    return;
  }

  const seq = ++_navSeq;
  try {
    const mod = await tryLoad(route.loader);
    if (seq !== _navSeq) return;
    if (!mod) {
      root.innerHTML = `<div class="page-placeholder"><div class="placeholder-icon">${route.icon}</div><h2>页面暂未实现</h2><p>对应的 pages/${route.id}.js 文件尚不存在。</p></div>`;
      return;
    }
    currentModule = mod;
    await mod.mount(root);
    sessionStorage.removeItem('_navReloadAttempted');
  } catch(e) {
    if (seq !== _navSeq) return;
    console.error(`页面 ${route.id} 加载失败`, e);
    if (!sessionStorage.getItem('_navReloadAttempted')) {
      sessionStorage.setItem('_navReloadAttempted', '1');
      location.reload();
      return;
    }
    root.innerHTML = `<div class="page-placeholder"><div class="placeholder-icon">⚠️</div><h2>加载失败</h2><p>${e.message}</p></div>`;
  }
}

// ── Auth UI ────────────────────────────────────────
onAuthChange(editor => {
  const btn = document.getElementById('lock-btn');
  const banner = document.getElementById('readonly-banner');
  const footer = document.getElementById('sidebar-footer');
  if (editor) {
    btn.textContent = '-- EDITING --';
    btn.classList.add('unlocked');
    if (banner) banner.classList.remove('show');
    footer.innerHTML = '<div style="padding:8px 12px;font-size:12px;color:var(--muted);border-top:1px solid var(--border)">编辑模式已解锁</div>';
  } else {
    btn.textContent = 'READONLY';
    btn.classList.remove('unlocked');
    if (banner) banner.classList.add('show');
    footer.innerHTML = '';
    buildNav();
  }
});

// ── Password modal ─────────────────────────────────
window.showPwModal = function() {
  if (isEditor()) { lock(); return; }
  document.getElementById('pw-input').value = '';
  document.getElementById('pw-error').style.display = 'none';
  document.getElementById('pw-modal').classList.add('show');
  setTimeout(() => document.getElementById('pw-input').focus(), 60);
};
window.closePwModal = function() {
  document.getElementById('pw-modal').classList.remove('show');
  document.getElementById('pw-error').style.display = 'none';
  document.getElementById('pw-input').value = '';
};
window.submitPw = async function() {
  const pw = document.getElementById('pw-input').value;
  const hashBuffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
  const hashHex = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2,'0')).join('');
  if (hashHex === window.EDIT_PASSWORD_HASH) {
    window.EDIT_PASSWORD = pw;
    tryUnlock(pw);
    delete window.EDIT_PASSWORD;
    window.closePwModal();
    showToast('ok 已解锁编辑模式');
  } else {
    document.getElementById('pw-error').style.display = 'block';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
};
document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key==='Enter') { e.preventDefault(); e.stopPropagation(); window.submitPw(); }
  if (e.key==='Escape') { e.stopPropagation(); window.closePwModal(); }
});
document.getElementById('pw-modal').addEventListener('click', e => {
  if (e.target===document.getElementById('pw-modal')) window.closePwModal();
});

// ── Left sidebar toggle ────────────────────────────
bindPanelToggle(document, '#sidebar', '#sidebar-toggle', '#sidebar-expand', '#sidebar-toggle');

// ── Init ───────────────────────────────────────────
initSidebar();
buildNav();
navigate('library');
</script>
