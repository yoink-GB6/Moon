#page-pw-box label,

#page-pw-input,
#set-lock-input {

  box-sizing: border-box;

<div id="toast"></div>

<script src="core/starfield.js"></script>
<script type="module">
const _V = Date.now(); // 缓存破坏版本号，每次加载页面时生成
import { showToast, initSidebar, closeSidebar, confirmDialog, bindPanelToggle } from './core/ui.js';
import { isEditor, tryUnlock, lock, onAuthChange } from './core/auth.js';
import { supaClient } from './core/supabase-client.js';

// ── Router config ──────────────────────────────────
// 添加新页面：在这里加一条记录，并在 pages/ 目录下建对应 .js 文件
const ROUTES = [
  {
    id: 'home',
    label: '⌂ 主页',
    icon: '⌂',
    loader: () => import('./pages/home.js?v='+_V),
  },
  {
    id: 'characters',
    label: '☲ 世界观及人物',
    icon: '☲',
    loader: () => import('./pages/characters.js?v='+_V),
  },
  {
    id: 'library',
    label: '¶ 指令集',
    icon: '¶',
    loader: () => import('./pages/library.js?v='+_V),
  },
  {
    id: 'timeline',
    label: '⏱ 时间轴',
    icon: '⏱',
    loader: () => import('./pages/timeline.js?v='+_V),
  },
  // 未来在这里添加更多页面：
  // { id: 'gallery', label: '🖼 图库', icon: '🖼', loader: () => import('./pages/gallery.js'), placeholder: true },
];

// ── State ──────────────────────────────────────────
let currentRoute = null;
let currentModule = null;

// ── Page Lock State ────────────────────────────────
let pageLocks = {};          // { pageId: sha256Hash }
const sessionUnlocked = new Set(); // 本次会话中已解锁的页面

// SHA-256 工具函数
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// 从 Supabase 加载页面锁定配置
async function loadPageLocks() {
  try {
    const { data } = await supaClient.from('site_content').select('value').eq('key','page_locks').single();
    if (data?.value) pageLocks = JSON.parse(data.value);
  } catch(e) { /* 首次使用时可能没有记录，忽略 */ }
  buildNav();
  updateLockPanelSelects();
}

// 保存页面锁定配置到 Supabase
async function savePageLocks() {
  await supaClient.from('site_content')
    .upsert({ key: 'page_locks', value: JSON.stringify(pageLocks) }, { onConflict: 'key' });
}

// 更新加密面板中的 select 选项和按钮状态
function updateLockPanelSelects() {
  const sel = document.getElementById('page-lock-select');
  if (!sel) return;
  // 更新每个 option 的显示（加/去锁图标）
  ROUTES.forEach(r => {
    const opt = sel.querySelector(`option[value="${r.id}"]`);
    if (opt) opt.textContent = pageLocks[r.id] ? `${r.label}  🔒` : r.label;
  });
  updateLockBtns(sel.value);
}

// 根据选中的 page 显示/隐藏「移除」按钮
function updateLockBtns(pageId) {
  const removeBtn = document.getElementById('page-lock-remove-btn');
  if (!removeBtn) return;
  removeBtn.style.display = pageLocks[pageId] ? '' : 'none';
}

// ── Build nav ──────────────────────────────────────
function buildNav() {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = ROUTES.map(r => `
    <div class="nav-item${r.id===currentRoute?.id?' active':''}" data-id="${r.id}">
      <span class="nav-icon">${r.icon}</span>
      <span class="nav-label">${r.label.replace(r.icon,'').trim()}</span>
      ${r.placeholder ? '<span style="font-size:10px;color:#555;margin-left:auto">soon</span>' : ''}
      ${pageLocks[r.id] && !isEditor() ? '<span class="nav-lock-icon">🔒</span>' : ''}
    </div>
  `).join('');
  nav.querySelectorAll('.nav-item').forEach(el => {
    el.addEventListener('click', () => {
      navigate(el.dataset.id);
      closeSidebar();
    });
  });
}

// ── Navigate ────────────────────────────────────────
async function navigate(id) {
  const route = ROUTES.find(r => r.id === id) || ROUTES[0];
  if (currentRoute?.id === route.id) return;

  // 检查该页面是否加密（编辑者和本次已解锁的页面直接通过）
  if (pageLocks[route.id] && !isEditor() && !sessionUnlocked.has(route.id)) {
    showPagePasswordModal(route);
    return;
  }

  // Unmount current
  if (currentModule?.unmount) currentModule.unmount();

  currentRoute = route;
  currentModule = null;
  buildNav();

  // Update topbar title
  document.getElementById('topbar-title').textContent = route.label;

  // Mount new page
  const root = document.getElementById('page-root');
  root.innerHTML = '';

  if (route.placeholder) {
    root.innerHTML = `
      <div class="page-placeholder">
        <div class="placeholder-icon">${route.icon}</div>
        <h2>${route.label.replace(route.icon,'').trim()}</h2>
        <p>这个页面正在建设中，敬请期待。</p>
      </div>`;
    return;
  }

  try {
    const mod = await route.loader();
    if (!mod) {
      root.innerHTML = `<div class="page-placeholder"><div class="placeholder-icon">${route.icon}</div><h2>页面暂未实现</h2><p>对应的 pages/${route.id}.js 文件尚不存在。</p></div>`;
      return;
    }
    currentModule = mod;
    await mod.mount(root);
  } catch(e) {
    console.error(`页面 ${route.id} 加载失败`, e);
    root.innerHTML = `<div class="page-placeholder"><div class="placeholder-icon">⚠️</div><h2>加载失败</h2><p>${e.message}</p></div>`;
  }
}

// ── Auth UI ────────────────────────────────────────
onAuthChange(editor => {
  const btn = document.getElementById('lock-btn');
  const banner = document.getElementById('readonly-banner');
  const footer = document.getElementById('sidebar-footer');
  if (editor) {
    btn.textContent = '-- EDITING --';
    btn.classList.add('unlocked');
    if (banner) banner.classList.remove('show');
    // 显示编辑状态 + 页面加密管理面板
    footer.innerHTML = `
      <div class="editor-status"> 编辑模式已解锁</div>
      <div id="page-lock-panel">
        <div class="page-lock-header"> 页面加密</div>
        <select id="page-lock-select">
          ${ROUTES.map(r => `<option value="${r.id}">${pageLocks[r.id] ? r.label + '  🔒' : r.label}</option>`).join('')}
        </select>
        <div class="page-lock-btns">
          <button id="page-lock-set-btn" class="btn bp">设置密码</button>
          <button id="page-lock-remove-btn" class="btn br" style="${pageLocks[ROUTES[0]?.id] ? '' : 'display:none'}">移除加密</button>
        </div>
      </div>`;
    bindLockPanel();
  } else {
    btn.textContent = 'READONLY';
    btn.classList.remove('unlocked');
    if (banner) banner.classList.add('show');
    footer.innerHTML = '';
    buildNav(); // 重新构建导航（可能需要显示锁图标）
  }
});

// 绑定加密面板的事件
function bindLockPanel() {
  const sel = document.getElementById('page-lock-select');
  // 初始化按钮状态
  updateLockBtns(sel?.value);

  sel?.addEventListener('change', () => updateLockBtns(sel.value));

  document.getElementById('page-lock-set-btn')?.addEventListener('click', () => {
    const pageId = document.getElementById('page-lock-select').value;
    window.showSetLockModal(pageId);
  });

  document.getElementById('page-lock-remove-btn')?.addEventListener('click', async () => {
    const pageId = document.getElementById('page-lock-select').value;
    const route = ROUTES.find(r => r.id === pageId);
    if (confirmDialog(`确定移除「${route.label}」的加密吗？`)) {
      delete pageLocks[pageId];
      sessionUnlocked.delete(pageId);
      await savePageLocks();
      showToast('✅ 已移除页面加密');
      buildNav();
      updateLockPanelSelects();
    }
  });
}

// ── Password modal (global) ────────────────────────
window.showPwModal = function() {
  if (isEditor()) { lock(); return; }
  document.getElementById('pw-input').value = '';
  document.getElementById('pw-error').style.display = 'none';
  document.getElementById('pw-modal').classList.add('show');
  setTimeout(() => document.getElementById('pw-input').focus(), 60);
};
window.closePwModal = function() {
  document.getElementById('pw-modal').classList.remove('show');
  document.getElementById('pw-error').style.display = 'none';
  document.getElementById('pw-input').value = '';
};
window.submitPw = async function() {
  const pw = document.getElementById('pw-input').value;
  const hashBuffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
  const hashHex = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2,'0')).join('');
  if (hashHex === window.EDIT_PASSWORD_HASH) {
    window.EDIT_PASSWORD = pw;
    tryUnlock(pw);
    delete window.EDIT_PASSWORD;
    window.closePwModal();
    showToast('ok 已解锁编辑模式');
  } else {
    document.getElementById('pw-error').style.display = 'block';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
};
document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key==='Enter') {
    e.preventDefault();
    e.stopPropagation();
    window.submitPw();
  }
  if (e.key==='Escape') {
    e.stopPropagation();
    window.closePwModal();
  }
});
document.getElementById('pw-modal').addEventListener('click', e => {
  if (e.target===document.getElementById('pw-modal')) window.closePwModal();
});

// ── 访问加密页面的弹窗 ─────────────────────────────
let _pendingNavRoute = null;

function showPagePasswordModal(route) {
  _pendingNavRoute = route;
  document.getElementById('page-pw-page-name').textContent = route.label;
  document.getElementById('page-pw-input').value = '';
  document.getElementById('page-pw-error').style.display = 'none';
  document.getElementById('page-pw-modal').classList.add('show');
  setTimeout(() => document.getElementById('page-pw-input').focus(), 60);
}

window.closePagePwModal = function() {
  document.getElementById('page-pw-modal').classList.remove('show');
  document.getElementById('page-pw-input').value = '';
  _pendingNavRoute = null;
};

window.submitPagePw = async function() {
  if (!_pendingNavRoute) return;
  const pw = document.getElementById('page-pw-input').value;
  const hash = await sha256(pw);
  if (hash === pageLocks[_pendingNavRoute.id]) {
    sessionUnlocked.add(_pendingNavRoute.id);
    const route = _pendingNavRoute;
    window.closePagePwModal();
    navigate(route.id);
  } else {
    document.getElementById('page-pw-error').style.display = 'block';
    document.getElementById('page-pw-input').value = '';
    document.getElementById('page-pw-input').focus();
  }
};

document.getElementById('page-pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); window.submitPagePw(); }
  if (e.key === 'Escape') { e.stopPropagation(); window.closePagePwModal(); }
});
document.getElementById('page-pw-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('page-pw-modal')) window.closePagePwModal();
});

// ── 设置页面加密密码的弹窗 ─────────────────────────
window.showSetLockModal = function(pageId) {
  const route = ROUTES.find(r => r.id === pageId);
  document.getElementById('set-lock-page-name').textContent = route.label;
  document.getElementById('set-lock-page-id').value = pageId;
  document.getElementById('set-lock-input').value = '';
  document.getElementById('set-lock-error').style.display = 'none';
  document.getElementById('set-lock-modal').classList.add('show');
  setTimeout(() => document.getElementById('set-lock-input').focus(), 60);
};

window.closeSetLockModal = function() {
  document.getElementById('set-lock-modal').classList.remove('show');
  document.getElementById('set-lock-input').value = '';
};

window.submitSetLock = async function() {
  const pw = document.getElementById('set-lock-input').value.trim();
  if (!pw) {
    document.getElementById('set-lock-error').textContent = '密码不能为空';
    document.getElementById('set-lock-error').style.display = 'block';
    return;
  }
  const pageId = document.getElementById('set-lock-page-id').value;
  pageLocks[pageId] = await sha256(pw);
  await savePageLocks();
  showToast('✅ 页面加密已设置');
  window.closeSetLockModal();
  buildNav();
  updateLockPanelSelects();
};

document.getElementById('set-lock-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); window.submitSetLock(); }
  if (e.key === 'Escape') { e.stopPropagation(); window.closeSetLockModal(); }
});
document.getElementById('set-lock-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('set-lock-modal')) window.closeSetLockModal();
});

// ── Left sidebar toggle ────────────────────────────
bindPanelToggle(document, '#sidebar', '#sidebar-toggle', '#sidebar-expand', '#sidebar-toggle');

// ── Init ───────────────────────────────────────────
initSidebar();
buildNav();
navigate('library');  // 默认进入指令集页面
loadPageLocks();      // 异步加载页面加密配置
</script>
